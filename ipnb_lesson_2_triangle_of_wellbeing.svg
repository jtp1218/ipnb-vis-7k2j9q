<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Triangle of Wellbeing</title>
  <desc id="desc">An equilateral triangle with three corners labeled Mind, Embodied Brain, and Relationships, with Energy and Information Flow at the center as the unifying process.</desc>
  <style>
    .corner-label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 700; text-anchor: middle; }
    .corner-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-style: italic; text-anchor: middle; }
    .center-label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; fill: #1a1a1a; }
    .center-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; text-anchor: middle; fill: #555; }
    .footer { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #1a1a1a; font-weight: 600; }
    .footer-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; text-anchor: middle; fill: #555; font-style: italic; }
  </style>
  <polygon points="400,80 130,440 670,440" fill="#fafafa" stroke="#555" stroke-width="2"/>
  <line x1="400" y1="320" x2="400" y2="130" stroke="#999" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="400" y1="320" x2="190" y2="410" stroke="#999" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="400" y1="320" x2="610" y2="410" stroke="#999" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="400" cy="100" r="62" fill="#fff4cc" stroke="#d8a83b" stroke-width="2.5"/>
  <text x="400" y="92" class="corner-label" fill="#7a5f1c">MIND</text>
  <text x="400" y="112" class="corner-sub" fill="#7a5f1c">regulates</text>
  <text x="400" y="128" class="corner-sub" fill="#7a5f1c">the flow</text>
  <circle cx="155" cy="430" r="72" fill="#e8f4ff" stroke="#3b7dd8" stroke-width="2.5"/>
  <text x="155" y="418" class="corner-label" fill="#1c4a7a">EMBODIED</text>
  <text x="155" y="438" class="corner-label" fill="#1c4a7a">BRAIN</text>
  <text x="155" y="458" class="corner-sub" fill="#1c4a7a">mechanism</text>
  <text x="155" y="474" class="corner-sub" fill="#1c4a7a">of the flow</text>
  <circle cx="645" cy="430" r="72" fill="#ffe8e8" stroke="#d83b3b" stroke-width="2.5"/>
  <text x="645" y="424" class="corner-label" fill="#7a1c1c">RELATION-</text>
  <text x="645" y="444" class="corner-label" fill="#7a1c1c">SHIPS</text>
  <text x="645" y="464" class="corner-sub" fill="#7a1c1c">sharing</text>
  <text x="645" y="480" class="corner-sub" fill="#7a1c1c">of the flow</text>
  <circle cx="400" cy="320" r="78" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  <text x="400" y="305" class="center-label">ENERGY +</text>
  <text x="400" y="325" class="center-label">INFORMATION</text>
  <text x="400" y="345" class="center-label">FLOW</text>
  <text x="400" y="365" class="center-sub">(the unifying unit — Lesson 3)</text>
  <text x="400" y="510" class="footer">Three points. One process. Three faces of the same thing.</text>
  <text x="400" y="530" class="footer-sub">"Mind, brain, and relationships are not three things — they are three faces of one process."</text>
</svg>
