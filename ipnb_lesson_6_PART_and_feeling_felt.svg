<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PART — How Healthy Relationship Works</title>
  <desc id="desc">A four-stage flow diagram showing Siegel's PART acronym for relational connection: Presence opens the door, Attunement enters the room, Resonance joins what is there, and Trust changes what becomes possible. The bottom shows the result — feeling felt — as the integration outcome with two minds becoming a "we" while remaining differentiated.</desc>
  <style>
    .title-text { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; fill: #1a1a1a; }
    .sub-text { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; text-anchor: middle; fill: #555; font-style: italic; }
    .letter { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 36px; font-weight: 800; text-anchor: middle; }
    .stage-name { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 15px; font-weight: 700; text-anchor: middle; fill: #1a1a1a; }
    .stage-def { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; text-anchor: middle; fill: #444; }
    .stage-key { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; text-anchor: middle; fill: #666; font-style: italic; }
    .quote-text { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #1a1a1a; font-style: italic; }
    .feeling-felt { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 26px; text-anchor: middle; fill: #5a2d99; font-weight: 800; letter-spacing: 1px; }
    .footer-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; text-anchor: middle; fill: #555; font-style: italic; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
  <text x="450" y="32" class="title-text">P · A · R · T — HOW RELATIONSHIPS HEAL</text>
  <text x="450" y="52" class="sub-text">a relationship = the sharing of energy and information flow</text>
  <g transform="translate(50, 90)">
    <rect width="180" height="200" rx="10" fill="#fff8e1" stroke="#d8a83b" stroke-width="2.5"/>
    <text x="90" y="58" class="letter" fill="#d8a83b">P</text>
    <line x1="40" y1="78" x2="140" y2="78" stroke="#d8a83b" stroke-width="1"/>
    <text x="90" y="100" class="stage-name">PRESENCE</text>
    <text x="90" y="125" class="stage-def">open · receptive</text>
    <text x="90" y="142" class="stage-def">embracing uncertainty</text>
    <text x="90" y="159" class="stage-def">no top-down filter</text>
    <text x="90" y="186" class="stage-key">"opens the door"</text>
  </g>
  <line x1="240" y1="190" x2="265" y2="190" stroke="#888" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g transform="translate(275, 90)">
    <rect width="180" height="200" rx="10" fill="#e3f2fd" stroke="#3b7dd8" stroke-width="2.5"/>
    <text x="90" y="58" class="letter" fill="#3b7dd8">A</text>
    <line x1="40" y1="78" x2="140" y2="78" stroke="#3b7dd8" stroke-width="1"/>
    <text x="90" y="100" class="stage-name">ATTUNEMENT</text>
    <text x="90" y="125" class="stage-def">attention on the</text>
    <text x="90" y="142" class="stage-def">INNER experience</text>
    <text x="90" y="159" class="stage-def">mind beneath behavior</text>
    <text x="90" y="186" class="stage-key">"enters the room"</text>
  </g>
  <line x1="465" y1="190" x2="490" y2="190" stroke="#888" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g transform="translate(500, 90)">
    <rect width="180" height="200" rx="10" fill="#ffe8e8" stroke="#d83b3b" stroke-width="2.5"/>
    <text x="90" y="58" class="letter" fill="#d83b3b">R</text>
    <line x1="40" y1="78" x2="140" y2="78" stroke="#d83b3b" stroke-width="1"/>
    <text x="90" y="100" class="stage-name">RESONANCE</text>
    <text x="90" y="125" class="stage-def">CHANGED by the other</text>
    <text x="90" y="142" class="stage-def">while staying</text>
    <text x="90" y="159" class="stage-def">DIFFERENTIATED</text>
    <text x="90" y="186" class="stage-key">"joins what is there"</text>
  </g>
  <line x1="690" y1="190" x2="715" y2="190" stroke="#888" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g transform="translate(725, 90)">
    <rect width="170" height="200" rx="10" fill="#e8ffe8" stroke="#3bd86a" stroke-width="3"/>
    <text x="85" y="58" class="letter" fill="#1c5a2c">T</text>
    <line x1="35" y1="78" x2="135" y2="78" stroke="#3bd86a" stroke-width="1"/>
    <text x="85" y="100" class="stage-name">TRUST</text>
    <text x="85" y="125" class="stage-def">defenses ↓</text>
    <text x="85" y="142" class="stage-def">social engagement</text>
    <text x="85" y="159" class="stage-def">system ON</text>
    <text x="85" y="186" class="stage-key">"healing possible"</text>
  </g>
  <line x1="450" y1="305" x2="450" y2="345" stroke="#888" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(0, 360)">
    <rect x="100" y="0" width="700" height="180" rx="12" fill="#f4e8ff" stroke="#7d3bd8" stroke-width="3"/>
    <text x="450" y="30" class="title-text" fill="#5a2d99">THE OUTCOME — what the other person experiences</text>
    <text x="450" y="80" class="feeling-felt">"FEELING FELT"</text>
    <text x="450" y="105" class="quote-text">— what Siegel's patient said when asked what had healed her —</text>
    <text x="450" y="124" class="sub-text">"Never in my life before did I ever have the experience of feeling felt."</text>
    <g transform="translate(180, 138)">
      <circle cx="20" cy="20" r="18" fill="#fff" stroke="#7d3bd8" stroke-width="2"/>
      <text x="20" y="25" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#5a2d99" font-weight="700">me</text>
      <circle cx="50" cy="20" r="18" fill="#fff" stroke="#7d3bd8" stroke-width="2"/>
      <text x="50" y="25" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#5a2d99" font-weight="700">we</text>
      <text x="100" y="25" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#555" font-style="italic">two minds become a "we" while remaining "me" and "you"</text>
    </g>
  </g>
  <text x="450" y="585" class="footer-sub">Resonance ≠ fusion. "Where's the differentiation?" prevents burnout.</text>
  <g transform="translate(0, 600)">
    <rect x="220" y="0" width="220" height="50" rx="6" fill="#ffe8e8" stroke="#d83b3b" stroke-width="1.5"/>
    <text x="330" y="20" class="footer-sub" fill="#7a1c1c" font-weight="700">FUSION (burnout)</text>
    <text x="330" y="40" class="footer-sub" fill="#7a1c1c">"What if that were ME?"</text>
    <rect x="460" y="0" width="220" height="50" rx="6" fill="#e8ffe8" stroke="#3bd86a" stroke-width="1.5"/>
    <text x="570" y="20" class="footer-sub" fill="#1c5a2c" font-weight="700">COMPASSION (sustainable)</text>
    <text x="570" y="40" class="footer-sub" fill="#1c5a2c">"What is that like for THEM?"</text>
  </g>
</svg>
