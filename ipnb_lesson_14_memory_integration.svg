<svg viewBox="0 0 1120 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title>Memory Integration — Implicit pieces, hippocampus assembler, explicit picture</title>
<desc>Diagram showing six implicit memory building blocks scattered when unintegrated (flashback) vs assembled by the hippocampus into a coherent explicit memory (resolved), with the therapeutic dual-focus move at the bottom.</desc>

<rect x="0" y="0" width="1120" height="820" fill="#ffffff"/>

<style>
  .title { font-size: 19px; font-weight: 700; fill: #1a1a1a; }
  .sub { font-size: 12px; fill: #666; font-style: italic; }
  .panel-title { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
  .panel-sub { font-size: 11px; fill: #444; }
  .piece-label { font-size: 10px; font-weight: 600; fill: #1a1a1a; }
  .piece-text { font-size: 9px; fill: #444; }
  .box-title { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .box-text { font-size: 11px; fill: #444; }
  .anatomy { font-size: 10px; fill: #666; font-style: italic; }
  .arrow-label { font-size: 10px; fill: #666; font-weight: 500; }
  .hippo-label { font-size: 11px; font-weight: 700; fill: #6b4a8d; letter-spacing: 0.5px; }
  .tag-good { font-size: 10px; font-weight: 700; fill: #2b6e3f; }
  .tag-bad { font-size: 10px; font-weight: 700; fill: #b54a2a; }
</style>

<!-- Title (shortened) -->
<text x="560" y="30" text-anchor="middle" class="title">Memory Integration — pieces, assembler, picture</text>
<text x="560" y="50" text-anchor="middle" class="sub">Six implicit building blocks → hippocampus assembles → explicit memory tagged "from the past"</text>
<text x="560" y="65" text-anchor="middle" class="sub">When trauma takes the hippocampus offline, the pieces stay scattered — and retrieve as a flashback</text>

<!-- LEFT PANEL: UNINTEGRATED -->
<rect x="20" y="95" width="520" height="380" rx="10" fill="#fef3f0" stroke="#d97757" stroke-width="1.8"/>
<text x="280" y="120" text-anchor="middle" class="panel-title">UNINTEGRATED — pure implicit memory</text>
<text x="280" y="138" text-anchor="middle" class="panel-sub">Hippocampus blocked. Pieces encoded separately, no "past" tag.</text>
<text x="280" y="153" text-anchor="middle" class="panel-sub">Retrieval feels like NOW. This is what a flashback IS.</text>

<!-- 6 scattered pieces -->
<g>
  <rect x="40" y="170" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2"/>
  <text x="97" y="188" text-anchor="middle" class="piece-label">BODILY</text>
  <text x="97" y="200" text-anchor="middle" class="piece-label">SENSATION</text>
  <text x="97" y="212" text-anchor="middle" class="piece-text">heart, gut, muscles</text>

  <rect x="180" y="185" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2" transform="rotate(-4 237 209)"/>
  <text x="237" y="204" text-anchor="middle" class="piece-label" transform="rotate(-4 237 209)">EMOTION</text>
  <text x="237" y="216" text-anchor="middle" class="piece-text" transform="rotate(-4 237 209)">fear · shame · rage</text>

  <rect x="320" y="170" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2" transform="rotate(3 377 194)"/>
  <text x="377" y="188" text-anchor="middle" class="piece-label" transform="rotate(3 377 194)">PERCEPTION</text>
  <text x="377" y="200" text-anchor="middle" class="piece-text" transform="rotate(3 377 194)">sights, sounds, smells</text>
  <text x="377" y="212" text-anchor="middle" class="piece-text" transform="rotate(3 377 194)">(rain on tin roof)</text>

  <rect x="50" y="255" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2" transform="rotate(-2 107 279)"/>
  <text x="107" y="273" text-anchor="middle" class="piece-label" transform="rotate(-2 107 279)">BEHAVIOR</text>
  <text x="107" y="285" text-anchor="middle" class="piece-text" transform="rotate(-2 107 279)">impulses to run,</text>
  <text x="107" y="297" text-anchor="middle" class="piece-text" transform="rotate(-2 107 279)">freeze, fight</text>

  <rect x="200" y="265" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2" transform="rotate(2 257 289)"/>
  <text x="257" y="283" text-anchor="middle" class="piece-label" transform="rotate(2 257 289)">MENTAL MODEL</text>
  <text x="257" y="295" text-anchor="middle" class="piece-text" transform="rotate(2 257 289)">"the world is</text>
  <text x="257" y="307" text-anchor="middle" class="piece-text" transform="rotate(2 257 289)">unsafe"</text>

  <rect x="340" y="250" width="115" height="48" rx="4" fill="#fff" stroke="#d97757" stroke-width="1.2" transform="rotate(-3 397 274)"/>
  <text x="397" y="268" text-anchor="middle" class="piece-label" transform="rotate(-3 397 274)">PRIMING</text>
  <text x="397" y="280" text-anchor="middle" class="piece-text" transform="rotate(-3 397 274)">readied responses</text>
  <text x="397" y="292" text-anchor="middle" class="piece-text" transform="rotate(-3 397 274)">to context cues</text>
</g>

<!-- The "feels like NOW" tag -->
<g>
  <ellipse cx="280" cy="350" rx="170" ry="22" fill="none" stroke="#b54a2a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="280" y="349" text-anchor="middle" class="tag-bad">RETRIEVED WITH NO "PAST" TAG</text>
  <text x="280" y="362" text-anchor="middle" class="piece-text">→ flashback · dissociation · "from nowhere"</text>
</g>

<!-- Mechanism note - tightened -->
<rect x="40" y="385" width="480" height="78" rx="6" fill="#fff" stroke="#d97757" stroke-width="1" stroke-dasharray="3,2"/>
<text x="280" y="402" text-anchor="middle" class="piece-label">Why: trauma blocks the hippocampus via two routes</text>
<text x="50" y="420" class="piece-text">  1. Divided attention — focal attention is elsewhere;</text>
<text x="50" y="432" class="piece-text">      pieces get encoded outside awareness</text>
<text x="50" y="448" class="piece-text">  2. Cortisol shuts off hippocampus + adrenaline</text>
<text x="50" y="460" class="piece-text">      amplifies implicit encoding</text>

<!-- RIGHT PANEL: INTEGRATED -->
<rect x="580" y="95" width="520" height="380" rx="10" fill="#eaf4ee" stroke="#3a7d5c" stroke-width="1.8"/>
<text x="840" y="120" text-anchor="middle" class="panel-title">INTEGRATED — hippocampus did its job</text>
<text x="840" y="138" text-anchor="middle" class="panel-sub">Six pieces woven into one coherent picture, tagged "past."</text>
<text x="840" y="153" text-anchor="middle" class="panel-sub">Retrieval has ECPHORY: "this happened. it's over."</text>

<!-- Hippocampus in center -->
<ellipse cx="840" cy="230" rx="60" ry="32" fill="#f1ecf6" stroke="#6b4a8d" stroke-width="2"/>
<text x="840" y="226" text-anchor="middle" class="hippo-label">HIPPOCAMPUS</text>
<text x="840" y="242" text-anchor="middle" class="piece-text">puzzle assembler</text>

<!-- Lines from hippocampus to 6 pieces -->
<g stroke="#6b4a8d" stroke-width="1.2" fill="none" opacity="0.5">
  <line x1="780" y1="205" x2="660" y2="180"/>
  <line x1="900" y1="205" x2="1020" y2="180"/>
  <line x1="780" y1="255" x2="660" y2="330"/>
  <line x1="900" y1="255" x2="1020" y2="330"/>
  <line x1="780" y1="230" x2="620" y2="255"/>
  <line x1="900" y1="230" x2="1060" y2="255"/>
</g>

<!-- 6 pieces tidily arranged -->
<g>
  <rect x="605" y="158" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="660" y="174" text-anchor="middle" class="piece-label">BODILY</text>
  <text x="660" y="188" text-anchor="middle" class="piece-text">felt &amp; named</text>

  <rect x="965" y="158" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="1020" y="174" text-anchor="middle" class="piece-label">EMOTION</text>
  <text x="1020" y="188" text-anchor="middle" class="piece-text">felt &amp; named</text>

  <rect x="565" y="235" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="620" y="251" text-anchor="middle" class="piece-label">PERCEPTION</text>
  <text x="620" y="265" text-anchor="middle" class="piece-text">contextualized</text>

  <rect x="1005" y="235" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="1060" y="251" text-anchor="middle" class="piece-label">BEHAVIOR</text>
  <text x="1060" y="265" text-anchor="middle" class="piece-text">understood</text>

  <rect x="605" y="308" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="660" y="324" text-anchor="middle" class="piece-label">MENTAL MODEL</text>
  <text x="660" y="338" text-anchor="middle" class="piece-text">revised</text>

  <rect x="965" y="308" width="110" height="42" rx="4" fill="#fff" stroke="#3a7d5c" stroke-width="1.2"/>
  <text x="1020" y="324" text-anchor="middle" class="piece-label">PRIMING</text>
  <text x="1020" y="338" text-anchor="middle" class="piece-text">unhooked</text>
</g>

<!-- ECPHORY tag -->
<g>
  <ellipse cx="840" cy="385" rx="180" ry="22" fill="none" stroke="#2b6e3f" stroke-width="2"/>
  <text x="840" y="384" text-anchor="middle" class="tag-good">RETRIEVED WITH "FROM THE PAST" TAG</text>
  <text x="840" y="397" text-anchor="middle" class="piece-text">→ ecphory: "this happened. it's over now."</text>
</g>

<!-- Result line -->
<rect x="600" y="425" width="480" height="38" rx="6" fill="#fff" stroke="#3a7d5c" stroke-width="1" stroke-dasharray="3,2"/>
<text x="840" y="442" text-anchor="middle" class="box-text">Two explicit forms:</text>
<text x="840" y="456" text-anchor="middle" class="box-text"><tspan font-weight="700">factual</tspan> (semantic, left-skewed) · <tspan font-weight="700">autobiographical</tspan> (episodic, right-skewed)</text>

<!-- BOTTOM: The therapeutic move -->
<rect x="20" y="490" width="1080" height="195" rx="10" fill="#eef4fa" stroke="#5b8db8" stroke-width="1.8"/>
<text x="560" y="515" text-anchor="middle" class="panel-title">THE THERAPEUTIC MOVE — Bjork's "retrieval as memory modifier" (reconsolidation)</text>
<text x="560" y="533" text-anchor="middle" class="panel-sub">You can't change what happened. You CAN change the engram.</text>
<text x="560" y="548" text-anchor="middle" class="panel-sub">Activate the OLD engram + add a NEW experience in the same window → unlearning.</text>

<!-- Two streams -->
<g>
  <rect x="60" y="565" width="490" height="105" rx="6" fill="#fff" stroke="#b54a2a" stroke-width="1.5"/>
  <text x="305" y="583" text-anchor="middle" class="piece-label" fill="#b54a2a">STREAM 1 — the OLD engram (activated, not denied)</text>
  <text x="75" y="603" class="piece-text">• Felt body — implicit pieces become felt again</text>
  <text x="75" y="617" class="piece-text">• Named — "this is shame. this is what 14-year-old me felt."</text>
  <text x="75" y="631" class="piece-text">• Acknowledged — "this is real. your nervous system isn't lying."</text>
  <text x="75" y="649" class="piece-text" font-style="italic">  Without Stream 2 → just re-traumatizing.</text>
  <text x="75" y="661" class="piece-text" font-style="italic">  A flashback in the office.</text>
</g>

<g>
  <rect x="570" y="565" width="490" height="105" rx="6" fill="#fff" stroke="#3a7d5c" stroke-width="1.5"/>
  <text x="815" y="583" text-anchor="middle" class="piece-label" fill="#3a7d5c">STREAM 2 — the NEW experience (added in the same window)</text>
  <text x="585" y="603" class="piece-text">• Therapist's regulated, present nervous system in the room</text>
  <text x="585" y="617" class="piece-text">• Adult-you alongside child-you — "you survived"</text>
  <text x="585" y="631" class="piece-text">• Meaning re-storied — "shame was a strategy to stay sane"</text>
  <text x="585" y="649" class="piece-text" font-style="italic">  Without Stream 1 active → just intellectual reframing.</text>
  <text x="585" y="661" class="piece-text" font-style="italic">  Never lands.</text>
</g>

<!-- Bottom mnemonic strip -->
<rect x="20" y="700" width="1080" height="105" rx="6" fill="#fafafa" stroke="#cccccc" stroke-width="1"/>
<text x="560" y="722" text-anchor="middle" class="box-title">Memory anchor: <tspan fill="#6b4a8d">"Trauma takes the hippocampus offline. Therapy puts it back to work."</tspan></text>
<text x="560" y="741" text-anchor="middle" class="box-text"><tspan font-weight="700">6 implicit pieces:</tspan> Bodily · Emotion · Perception · Behavior · Mental model · Priming</text>
<text x="560" y="757" text-anchor="middle" class="box-text"><tspan fill="#b54a2a" font-weight="700">Unintegrated → flashback (feels like NOW)</tspan> · <tspan fill="#3a7d5c" font-weight="700">Integrated → ecphory ("this happened. it's over.")</tspan></text>
<text x="560" y="778" text-anchor="middle" class="box-text" font-style="italic">"You're not crazy. You're just human. The retrieval just doesn't feel like the past —</text>
<text x="560" y="792" text-anchor="middle" class="box-text" font-style="italic">because the hippocampus never tagged it."</text>

</svg>
