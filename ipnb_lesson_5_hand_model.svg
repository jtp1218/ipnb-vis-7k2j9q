<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Siegel's Hand Model of the Brain — Lid Down vs Lid Flipped</title>
  <desc id="desc">A two-panel diagram showing Siegel's hand model. The left panel shows the integrated brain with fingers folded down over the thumb, with each part of the hand labeled to a brain region. The right panel shows the flipped lid with fingers raised, indicating loss of prefrontal regulation over the limbic area.</desc>
  <style>
    .title-text { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; fill: #1a1a1a; }
    .panel-title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 15px; font-weight: 700; text-anchor: middle; }
    .panel-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; text-anchor: middle; font-style: italic; fill: #555; }
    .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #1a1a1a; }
    .label-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; fill: #555; font-style: italic; }
    .legend-title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; font-weight: 700; text-anchor: middle; fill: #1a1a1a; }
    .legend-text { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; }
    .legend-sub { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; fill: #555; font-style: italic; }
    .footer { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; text-anchor: middle; fill: #1a1a1a; font-weight: 600; }
    .anno { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; fill: #7a1c1c; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#666"/>
    </marker>
  </defs>
  <text x="450" y="28" class="title-text">SIEGEL'S HAND MODEL OF THE BRAIN</text>
  <text x="450" y="48" class="panel-sub">make a fist · tuck thumb across palm · fold fingers down — that's your brain</text>
  <g transform="translate(0, 70)">
    <rect x="30" y="0" width="400" height="430" rx="10" fill="#f8fff8" stroke="#3bd86a" stroke-width="2"/>
    <text x="230" y="28" class="panel-title" fill="#1c5a2c">✓ LID DOWN — INTEGRATED</text>
    <text x="230" y="48" class="panel-sub">prefrontal in regulating contact with limbic</text>
    <rect x="200" y="350" width="60" height="40" rx="8" fill="#d6d6d6" stroke="#666" stroke-width="2"/>
    <line x1="290" y1="370" x2="350" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-r)"/>
    <text x="358" y="368" class="label">WRIST =</text>
    <text x="358" y="382" class="label">spinal cord</text>
    <text x="358" y="395" class="label-sub">vagus nerve, body↔brain</text>
    <rect x="180" y="200" width="100" height="155" rx="20" fill="#ffd6cc" stroke="#d8553b" stroke-width="2.5"/>
    <text x="230" y="290" class="label" text-anchor="middle">PALM =</text>
    <text x="230" y="305" class="label" text-anchor="middle">BRAINSTEM</text>
    <text x="230" y="322" class="label-sub" text-anchor="middle">~300M years</text>
    <text x="230" y="335" class="label-sub" text-anchor="middle">survival, breath, fight/flight</text>
    <rect x="190" y="220" width="80" height="42" rx="14" fill="#fff4cc" stroke="#d8a83b" stroke-width="2.5"/>
    <text x="230" y="237" class="label" text-anchor="middle">THUMB =</text>
    <text x="230" y="252" class="label" text-anchor="middle">LIMBIC AREA</text>
    <rect x="175" y="170" width="110" height="60" rx="20" fill="#cce4ff" stroke="#3b7dd8" stroke-width="2.5"/>
    <text x="230" y="195" class="label" text-anchor="middle">FINGERS =</text>
    <text x="230" y="210" class="label" text-anchor="middle">CORTEX</text>
    <ellipse cx="230" cy="230" rx="55" ry="14" fill="#e0ccff" stroke="#7d3bd8" stroke-width="2.5"/>
    <text x="230" y="234" class="label" text-anchor="middle" fill="#5a2d99">FINGERTIPS = PREFRONTAL CORTEX</text>
    <text x="80" y="225" class="anno" fill="#1c5a2c">↓ in CONTACT</text>
    <text x="80" y="240" class="legend-sub">prefrontal touching limbic =</text>
    <text x="80" y="253" class="legend-sub">vertical integration intact</text>
    <text x="230" y="408" class="legend-text" text-anchor="middle" fill="#5a2d99" font-weight="700">Prefrontal cortex online:</text>
    <text x="230" y="422" class="legend-sub" text-anchor="middle">empathy · insight · attuned communication · response flexibility</text>
  </g>
  <g transform="translate(470, 70)">
    <rect x="0" y="0" width="400" height="430" rx="10" fill="#fff8f8" stroke="#d83b3b" stroke-width="2"/>
    <text x="200" y="28" class="panel-title" fill="#7a1c1c">✗ LID FLIPPED — DYSREGULATED</text>
    <text x="200" y="48" class="panel-sub">prefrontal disengaged · limbic running the show</text>
    <rect x="170" y="350" width="60" height="40" rx="8" fill="#d6d6d6" stroke="#666" stroke-width="2"/>
    <rect x="150" y="200" width="100" height="155" rx="20" fill="#ffd6cc" stroke="#d8553b" stroke-width="2.5"/>
    <text x="200" y="290" class="label" text-anchor="middle">BRAINSTEM</text>
    <text x="200" y="307" class="label-sub" text-anchor="middle">survival mode</text>
    <rect x="160" y="225" width="80" height="42" rx="14" fill="#ffe066" stroke="#d8a83b" stroke-width="3"/>
    <text x="200" y="242" class="label" text-anchor="middle" fill="#7a5f1c">LIMBIC</text>
    <text x="200" y="257" class="label" text-anchor="middle" fill="#7a5f1c">EXPOSED</text>
    <rect x="145" y="100" width="110" height="80" rx="20" fill="#cce4ff" stroke="#3b7dd8" stroke-width="2.5"/>
    <text x="200" y="135" class="label" text-anchor="middle">CORTEX</text>
    <text x="200" y="150" class="label" text-anchor="middle">LIFTED</text>
    <ellipse cx="200" cy="100" rx="55" ry="12" fill="#e0ccff" stroke="#7d3bd8" stroke-width="2.5" stroke-dasharray="4 3"/>
    <text x="200" y="103" class="label" text-anchor="middle" fill="#5a2d99">PREFRONTAL OFFLINE</text>
    <line x1="200" y1="178" x2="200" y2="218" stroke="#d83b3b" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="265" y="195" class="anno">⚠ LOST</text>
    <text x="265" y="210" class="anno">CONTACT</text>
    <text x="200" y="408" class="legend-text" text-anchor="middle" fill="#7a1c1c" font-weight="700">Limbic running unchecked:</text>
    <text x="200" y="422" class="legend-sub" text-anchor="middle">no empathy · no insight · no flexibility · reactivity rules</text>
  </g>
  <g transform="translate(0, 530)">
    <text x="450" y="0" class="legend-title">THE FOUR LAYERS — WHAT EACH PART OF THE HAND REPRESENTS</text>
    <line x1="200" y1="10" x2="700" y2="10" stroke="#999" stroke-width="1"/>
    <g transform="translate(40, 25)">
      <rect width="14" height="14" fill="#d6d6d6" stroke="#666" stroke-width="1.5"/>
      <text x="22" y="12" class="legend-text" font-weight="700">WRIST · spinal cord</text>
      <text x="22" y="28" class="legend-sub">information highway, vagus nerve</text>
    </g>
    <g transform="translate(260, 25)">
      <rect width="14" height="14" fill="#ffd6cc" stroke="#d8553b" stroke-width="1.5"/>
      <text x="22" y="12" class="legend-text" font-weight="700">PALM · brainstem</text>
      <text x="22" y="28" class="legend-sub">survival, fight/flight, basics</text>
    </g>
    <g transform="translate(490, 25)">
      <rect width="14" height="14" fill="#fff4cc" stroke="#d8a83b" stroke-width="1.5"/>
      <text x="22" y="12" class="legend-text" font-weight="700">THUMB · limbic area</text>
      <text x="22" y="28" class="legend-sub">emotion, motivation, memory, attachment</text>
    </g>
    <g transform="translate(720, 25)">
      <rect width="14" height="14" fill="#cce4ff" stroke="#3b7dd8" stroke-width="1.5"/>
      <text x="22" y="12" class="legend-text" font-weight="700">FINGERS · cortex</text>
      <text x="22" y="28" class="legend-sub">maps, perception, thought</text>
    </g>
    <g transform="translate(310, 70)">
      <rect width="14" height="14" fill="#e0ccff" stroke="#7d3bd8" stroke-width="2"/>
      <text x="22" y="12" class="legend-text" font-weight="700">FINGERTIPS · prefrontal cortex</text>
      <text x="22" y="28" class="legend-sub">the regulator — empathy, insight, response flexibility, moral awareness</text>
    </g>
  </g>
  <text x="450" y="675" class="footer">"When the lid flips, the limbic system runs the show. The work is to bring the fingers back down."</text>
</svg>
