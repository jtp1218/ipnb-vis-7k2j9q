<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">Narrative Integration — Cohesive Prison vs. Coherent River</title>
<desc id="d">Two contrasting narrative stances: rigid cohesive narrative that leaks unintegrated implicit memory, versus fluid coherent narrative that links past, present, and future in a Bring-It-On stance. Above, the two brain circuits: midline DMN narrator (OWN — Observe-Witness-Narrate) and lateral sensing circuit, which are mutually inhibitory.</desc>

<style>
  .h { font: 700 22px ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
  .s { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #3a3a3a; }
  .b { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: #3a3a3a; }
  .t { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #555555; }
  .lbl { font: 700 11px ui-sans-serif, system-ui, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
  .tag { font: 600 10px ui-sans-serif, system-ui, sans-serif; fill: #555555; letter-spacing: 0.8px; }
  .cap { font: italic 12px ui-sans-serif, system-ui, sans-serif; fill: #666666; }
</style>

<rect width="900" height="620" fill="#ffffff"/>

<!-- Title -->
<text x="450" y="32" class="h" text-anchor="middle">Narrative Integration — Two Stances Toward Your Own Story</text>
<text x="450" y="54" class="cap" text-anchor="middle">A story is born when reality violates expectation (Bruner). What you do next decides whether your narrative becomes a prison or a river.</text>

<!-- ===== TOP: Brain circuits row ===== -->
<text x="60" y="92" class="tag">BRAIN CIRCUITRY  ·  TWO STREAMS, MUTUALLY INHIBITORY (FARB &amp; SIEGEL)</text>

<!-- Lateral sensing -->
<g transform="translate(60,100)">
  <rect width="370" height="76" rx="10" fill="#eaf4ec" stroke="#5a8a6b" stroke-width="1.5"/>
  <text x="14" y="22" class="s">LATERAL  ·  Sensing Circuit</text>
  <text x="14" y="42" class="b">Body. Breath. Tea. Stairs. The corner of the lamp.</text>
  <text x="14" y="60" class="t">Present-moment sensation, left + right sides — pure now.</text>
</g>

<!-- Mutual inhibition arrows -->
<g transform="translate(430,138)">
  <line x1="0" y1="-10" x2="40" y2="-10" stroke="#b04a4a" stroke-width="2" marker-end="url(#redArr)"/>
  <line x1="40" y1="10" x2="0" y2="10" stroke="#b04a4a" stroke-width="2" marker-end="url(#redArr)"/>
  <text x="20" y="32" class="tag" text-anchor="middle">inhibits</text>
</g>

<!-- Midline DMN narrator -->
<g transform="translate(470,100)">
  <rect width="370" height="76" rx="10" fill="#f0eaf4" stroke="#7a5a8a" stroke-width="1.5"/>
  <text x="14" y="22" class="s">MIDLINE / DMN  ·  Narrator Circuit</text>
  <text x="14" y="42" class="b">O · W · N → Observe → Witness → Narrate</text>
  <text x="14" y="60" class="t">Default Mode Network — OATS: Others And The Self.</text>
</g>

<!-- Divider -->
<line x1="60" y1="200" x2="840" y2="200" stroke="#d8d8d8" stroke-width="1"/>

<!-- ===== MIDDLE: Two stances ===== -->
<text x="60" y="226" class="tag">TWO WAYS TO HOLD YOUR STORY</text>

<!-- LEFT: COHESIVE PRISON -->
<g transform="translate(60,240)">
  <rect width="370" height="280" rx="12" fill="#fbeeee" stroke="#b04a4a" stroke-width="1.8"/>

  <!-- header tab -->
  <rect x="0" y="0" width="370" height="32" rx="12" fill="#b04a4a"/>
  <rect x="0" y="20" width="370" height="12" fill="#b04a4a"/>
  <text x="14" y="22" class="lbl">COHESIVE  ·  THE PRISON</text>

  <!-- prison walls (bricks) -->
  <g transform="translate(35,52)" fill="#d8a8a8" stroke="#b04a4a" stroke-width="1">
    <rect x="0" y="0" width="60" height="18"/><rect x="60" y="0" width="60" height="18"/>
    <rect x="120" y="0" width="60" height="18"/><rect x="180" y="0" width="60" height="18"/>
    <rect x="240" y="0" width="60" height="18"/>
    <rect x="-15" y="18" width="60" height="18"/><rect x="45" y="18" width="60" height="18"/>
    <rect x="105" y="18" width="60" height="18"/><rect x="165" y="18" width="60" height="18"/>
    <rect x="225" y="18" width="60" height="18"/><rect x="285" y="18" width="60" height="18"/>
  </g>
  <text x="185" y="113" class="s" text-anchor="middle" fill="#7a2828">"Everything was fine."</text>
  <text x="185" y="131" class="t" text-anchor="middle">tight · fixed · rigid · sealed</text>

  <!-- lightning bolts breaking through (unintegrated implicit) -->
  <g fill="#e8b04a" stroke="#a86e1c" stroke-width="1">
    <polygon points="80,150 90,138 86,148 96,148 84,164 88,154 78,154"/>
    <polygon points="190,150 200,138 196,148 206,148 194,164 198,154 188,154"/>
    <polygon points="290,150 300,138 296,148 306,148 294,164 298,154 288,154"/>
  </g>
  <text x="185" y="184" class="b" text-anchor="middle">Implicit memory leaks through anyway</text>
  <text x="185" y="200" class="t" text-anchor="middle">flashback · flip the lid · "no, he didn't..." (AAI disorientation)</text>

  <!-- chain -->
  <g transform="translate(140,212)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="10" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="20" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="30" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="40" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="50" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="60" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="70" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
    <circle cx="80" cy="0" r="5" fill="none" stroke="#7a2828" stroke-width="2"/>
  </g>

  <text x="185" y="244" class="b" text-anchor="middle" fill="#7a2828">Past, present, future → fused into one rigid script</text>
  <text x="185" y="262" class="t" text-anchor="middle">Unresolved trauma. Chaos or rigidity. Stuck.</text>
</g>

<!-- RIGHT: COHERENT RIVER -->
<g transform="translate(470,240)">
  <rect width="370" height="280" rx="12" fill="#eaf2f6" stroke="#3a6b85" stroke-width="1.8"/>

  <!-- header tab -->
  <rect x="0" y="0" width="370" height="32" rx="12" fill="#3a6b85"/>
  <rect x="0" y="20" width="370" height="12" fill="#3a6b85"/>
  <text x="14" y="22" class="lbl">COHERENT  ·  THE RIVER</text>

  <!-- river path (3 flowing waves) -->
  <path d="M 20 80 Q 90 60, 160 80 T 300 80 T 350 80" stroke="#3a6b85" stroke-width="3" fill="none" opacity="0.85"/>
  <path d="M 20 100 Q 90 80, 160 100 T 300 100 T 350 100" stroke="#5a8aa5" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 20 120 Q 90 100, 160 120 T 300 120 T 350 120" stroke="#7aa5c0" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- past / present / future markers -->
  <g class="t" text-anchor="middle">
    <text x="60" y="148">PAST</text>
    <text x="185" y="148">PRESENT</text>
    <text x="310" y="148">FUTURE</text>
  </g>
  <g fill="#3a6b85">
    <circle cx="60" cy="135" r="3"/>
    <circle cx="185" cy="135" r="3"/>
    <circle cx="310" cy="135" r="3"/>
  </g>

  <!-- bring it on stance -->
  <text x="185" y="184" class="s" text-anchor="middle" fill="#1f4a60">"Bring it on."</text>
  <text x="185" y="202" class="t" text-anchor="middle">fluid · flexible · integrated · permeable</text>

  <!-- key shift -->
  <text x="185" y="232" class="b" text-anchor="middle">Making sense of the past frees the present</text>
  <text x="185" y="248" class="t" text-anchor="middle">Past stays past · vulnerabilities known · future open</text>
  <text x="185" y="266" class="t" text-anchor="middle" fill="#1f4a60">Plateaus become launching pads, not prisons.</text>
</g>

<!-- ===== BOTTOM: Bruner engine ===== -->
<g transform="translate(60,540)">
  <rect width="780" height="62" rx="10" fill="#f7f4e8" stroke="#a8923a" stroke-width="1.5"/>
  <text x="14" y="22" class="tag" fill="#6b5a1c">THE BRUNER ENGINE  ·  STORIES ARE BORN HERE</text>
  <g transform="translate(14,38)" class="b">
    <text x="0" y="14">canonical violation</text>
    <text x="140" y="14" class="t">→</text>
    <text x="160" y="14">landscape of action  +  mindscape</text>
    <text x="420" y="14" class="t">→</text>
    <text x="440" y="14">making sense</text>
    <text x="560" y="14" class="t">→</text>
    <text x="580" y="14" fill="#1f4a60">integration · freedom · meaning</text>
  </g>
</g>

<!-- arrow marker -->
<defs>
  <marker id="redArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#b04a4a"/>
  </marker>
</defs>
</svg>