<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="system-ui, -apple-system, sans-serif">
<title id="ttl">The Five Layers of "Me"</title>
<desc id="desc">A vertical stack diagram showing the five layers that compose the differentiated Me at the core of MWe: biological, relational history (attachment), gender across three independent spectrums, cultural belonging, and evolutionary kinship. Each layer needs differentiation and linkage.</desc>

<style>
  .h1 { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
  .h2 { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
  .h3 { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .lbl { font-size: 12px; fill: #4a4a4a; }
  .sm  { font-size: 11px; fill: #6a6a6a; }
  .xs  { font-size: 10px; fill: #6a6a6a; }
  .card { fill: #f8f7f2; stroke: #d3cec4; stroke-width: 1; }
  .accent { fill: #c96442; }
</style>

<rect width="880" height="720" fill="#faf9f5"/>

<text x="440" y="32" text-anchor="middle" class="h1">The Five Layers of "Me"</text>
<text x="440" y="54" text-anchor="middle" class="lbl">what composes the differentiated self at the core of MWe</text>

<g transform="translate(30, 80)">
  <rect width="820" height="100" rx="12" class="card"/>
  <circle cx="42" cy="50" r="22" class="accent"/>
  <text x="42" y="56" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>

  <text x="82" y="32" class="h2">Biological</text>
  <text x="82" y="50" class="sm" font-style="italic">the bedrock — what you were before experience shaped you</text>
  <text x="82" y="74" class="lbl">• Genes &amp; epigenetics (inherited across generations)</text>
  <text x="82" y="92" class="lbl">• Temperament (innate nervous-system proclivities)</text>

  <g transform="translate(770, 50)" stroke="#c96442" fill="none" stroke-width="1.5">
    <path d="M -10 -30 Q 0 -15 10 0 Q 20 15 10 30"/>
    <path d="M 10 -30 Q 0 -15 -10 0 Q -20 15 -10 30"/>
    <line x1="-7" y1="-22" x2="7" y2="-22" stroke-width="1"/>
    <line x1="-8" y1="-11" x2="8" y2="-11" stroke-width="1"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke-width="1"/>
    <line x1="-8" y1="11" x2="8" y2="11" stroke-width="1"/>
    <line x1="-7" y1="22" x2="7" y2="22" stroke-width="1"/>
  </g>
</g>

<g transform="translate(30, 190)">
  <rect width="820" height="100" rx="12" class="card"/>
  <circle cx="42" cy="50" r="22" class="accent"/>
  <text x="42" y="56" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>

  <text x="82" y="32" class="h2">Relational history (attachment)</text>
  <text x="82" y="50" class="sm" font-style="italic">your first caregivers → attachment pattern → personality</text>
  <text x="82" y="74" class="lbl">Secure (55–65%) · Avoidant (~20%) · Ambivalent (~15%) · Disorganized (5–15%)</text>
  <text x="82" y="92" class="sm">→ produces coherent / disconnected / confused / fragmented identity</text>

  <g transform="translate(770, 50)" stroke="#c96442" fill="none" stroke-width="1.5">
    <circle cx="-14" cy="-10" r="6"/>
    <path d="M -20 -1 Q -14 -5 -8 -1 L -10 15 L -18 15 Z"/>
    <circle cx="14" cy="-10" r="6"/>
    <path d="M 8 -1 Q 14 -5 20 -1 L 18 15 L 10 15 Z"/>
    <line x1="-7" y1="2" x2="7" y2="2" stroke-dasharray="2 2"/>
  </g>
</g>

<g transform="translate(30, 300)">
  <rect width="820" height="140" rx="12" class="card"/>
  <circle cx="42" cy="70" r="22" class="accent"/>
  <text x="42" y="76" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>

  <text x="82" y="32" class="h2">Gender — THREE independent spectrums</text>
  <text x="82" y="50" class="sm" font-style="italic">don't conflate them — each has its own neurobiology, its own spectrum</text>

  <g transform="translate(82, 76)">
    <text x="0" y="0" class="h3">Gender identity</text>
    <line x1="0" y1="14" x2="200" y2="14" stroke="#c96442" stroke-width="2"/>
    <line x1="0" y1="9" x2="0" y2="19" stroke="#c96442" stroke-width="2"/>
    <line x1="200" y1="9" x2="200" y2="19" stroke="#c96442" stroke-width="2"/>
    <text x="0" y="34" class="xs">brain-level felt sense</text>
    <text x="0" y="48" class="xs">(masculinization-in-utero biology)</text>
  </g>

  <g transform="translate(330, 76)">
    <text x="0" y="0" class="h3">Gender behavior</text>
    <line x1="0" y1="14" x2="200" y2="14" stroke="#c96442" stroke-width="2"/>
    <line x1="0" y1="9" x2="0" y2="19" stroke="#c96442" stroke-width="2"/>
    <line x1="200" y1="9" x2="200" y2="19" stroke="#c96442" stroke-width="2"/>
    <text x="0" y="34" class="xs">cultural script of how</text>
    <text x="0" y="48" class="xs">my gender should act</text>
  </g>

  <g transform="translate(578, 76)">
    <text x="0" y="0" class="h3">Sexual orientation</text>
    <line x1="0" y1="14" x2="200" y2="14" stroke="#c96442" stroke-width="2"/>
    <line x1="0" y1="9" x2="0" y2="19" stroke="#c96442" stroke-width="2"/>
    <line x1="200" y1="9" x2="200" y2="19" stroke="#c96442" stroke-width="2"/>
    <text x="0" y="34" class="xs">to whom one is aroused</text>
    <text x="0" y="48" class="xs">(independent of the above)</text>
  </g>
</g>

<g transform="translate(30, 450)">
  <rect width="820" height="100" rx="12" class="card"/>
  <circle cx="42" cy="50" r="22" class="accent"/>
  <text x="42" y="56" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>

  <text x="82" y="32" class="h2">Cultural</text>
  <text x="82" y="50" class="sm" font-style="italic">the layers of belonging (or non-belonging)</text>
  <text x="82" y="74" class="lbl">• Race · ethnicity · religion · nationality · class · language</text>
  <text x="82" y="92" class="sm">→ am I treated as belonging in this culture, or as not-belonging?</text>

  <g transform="translate(770, 50)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#c96442" stroke-width="1.5"/>
    <circle cx="-9" cy="-5" r="4" class="accent"/>
    <circle cx="9" cy="-5" r="4" class="accent"/>
    <circle cx="0" cy="8" r="4" class="accent"/>
  </g>
</g>

<g transform="translate(30, 560)">
  <rect width="820" height="100" rx="12" class="card"/>
  <circle cx="42" cy="50" r="22" class="accent"/>
  <text x="42" y="56" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">5</text>

  <text x="82" y="32" class="h2">Evolutionary</text>
  <text x="82" y="50" class="sm" font-style="italic">deep-time kinship across all life</text>
  <text x="82" y="74" class="lbl">Human (40k y) → Primate (65 M y) → Mammal (200 M y) → Animal → Living being</text>
  <text x="82" y="92" class="sm">→ at the broadest, you are kin to everything alive on the planet</text>

  <g transform="translate(770, 50)" stroke="#c96442" fill="none" stroke-width="1.5">
    <line x1="0" y1="22" x2="0" y2="0"/>
    <line x1="0" y1="0" x2="-16" y2="-12"/>
    <line x1="0" y1="0" x2="16" y2="-12"/>
    <line x1="-16" y1="-12" x2="-22" y2="-22"/>
    <line x1="-16" y1="-12" x2="-10" y2="-22"/>
    <line x1="16" y1="-12" x2="22" y2="-22"/>
    <line x1="16" y1="-12" x2="10" y2="-22"/>
  </g>
</g>

<text x="440" y="690" text-anchor="middle" class="sm" font-style="italic">Each layer needs differentiation AND linkage. Together they compose the differentiated Me — one of three rings of MWe.</text>

</svg>
