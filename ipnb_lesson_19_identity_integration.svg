<svg viewBox="0 0 880 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="system-ui, -apple-system, sans-serif">
<title id="ttl">Identity Integration — MWe (Me + We held together)</title>
<desc id="desc">A diagram showing integrated identity as concentric rings of belonging — ME at the center (this body, this history), surrounded by WE (family, group, humanity), surrounded by ALL (living beings, the planet). MWe is the integrated whole. Below: three failure modes — Just Me, Just We, Us-vs-Them.</desc>

<style>
  .h1 { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
  .h2 { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
  .h3 { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .lbl { font-size: 12px; fill: #4a4a4a; }
  .sm  { font-size: 11px; fill: #6a6a6a; }
  .xs  { font-size: 10px; fill: #6a6a6a; }
  .card { fill: #ffffff; stroke: #d3cec4; stroke-width: 1; }
</style>

<rect width="880" height="700" fill="#faf9f5"/>

<text x="440" y="32" text-anchor="middle" class="h1">Identity Integration — "MWe"</text>
<text x="440" y="54" text-anchor="middle" class="lbl">Me + We held together — the self is the system, not just the node</text>

<g transform="translate(290, 260)">
  <circle r="190" fill="#f8f5f0" stroke="#d3cec4" stroke-width="1"/>
  <circle r="130" fill="#ffffff" stroke="#d3cec4" stroke-width="1"/>
  <circle r="80" fill="#ffffff" stroke="#c96442" stroke-width="2"/>
  <circle r="32" fill="#c96442"/>

  <text y="-158" text-anchor="middle" class="h2">ALL</text>
  <text y="-100" text-anchor="middle" class="h2">WE</text>
  <text y="-50" text-anchor="middle" class="h2" fill="#c96442">ME</text>
  <text y="3" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">MWe</text>
  <text y="18" text-anchor="middle" font-size="9" font-style="italic" fill="#ffffff">integrated</text>
</g>

<rect x="525" y="80" width="325" height="360" rx="14" class="card"/>
<text x="687" y="110" text-anchor="middle" class="h2">What each ring is</text>
<text x="687" y="128" text-anchor="middle" class="sm">all real · all needed · all linked</text>

<g transform="translate(550, 160)">
  <circle cx="0" cy="0" r="7" fill="#f8f5f0" stroke="#d3cec4" stroke-width="1"/>
  <text x="18" y="5" class="h3">ALL</text>
  <text x="18" y="24" class="lbl">all living beings · the planet</text>
  <text x="18" y="40" class="xs" font-style="italic">evolutionary kin across deep time</text>
</g>

<g transform="translate(550, 220)">
  <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="#d3cec4" stroke-width="1"/>
  <text x="18" y="5" class="h3">WE</text>
  <text x="18" y="24" class="lbl">family · group · humanity</text>
  <text x="18" y="40" class="xs" font-style="italic">built through PART (L17)</text>
</g>

<g transform="translate(550, 280)">
  <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="#c96442" stroke-width="2"/>
  <text x="18" y="5" class="h3" fill="#c96442">ME</text>
  <text x="18" y="24" class="lbl">this body · this history</text>
  <text x="18" y="40" class="xs">5 layers: biological · attachment ·</text>
  <text x="18" y="54" class="xs">gender (3 spectrums) · cultural · evolutionary</text>
</g>

<g transform="translate(550, 360)">
  <circle cx="0" cy="0" r="7" fill="#c96442"/>
  <text x="18" y="5" class="h3" fill="#c96442">MWe</text>
  <text x="18" y="24" class="lbl">the integrated whole</text>
  <text x="18" y="40" class="xs" font-style="italic">all three rings, held simultaneously</text>
</g>

<text x="30" y="478" class="h2">Three ways identity disintegrates</text>
<text x="30" y="496" class="sm">when one ring dominates and the others are denied</text>

<g transform="translate(30, 515)">
  <rect width="265" height="160" rx="10" fill="#f8f7f2" stroke="#d3cec4"/>
  <text x="16" y="26" class="h2">JUST ME</text>
  <text x="16" y="46" class="sm" font-style="italic">Einstein's "optical delusion of separateness"</text>
  <text x="16" y="74" class="lbl">• body as the whole self</text>
  <text x="16" y="94" class="lbl">• isolation · loneliness</text>
  <text x="16" y="114" class="lbl">• existential thinness</text>
  <text x="16" y="134" class="lbl">• modern Western default</text>
  <circle cx="240" cy="140" r="12" fill="#c96442"/>
</g>

<g transform="translate(305, 515)">
  <rect width="265" height="160" rx="10" fill="#f8f7f2" stroke="#d3cec4"/>
  <text x="16" y="26" class="h2">JUST WE</text>
  <text x="16" y="46" class="sm" font-style="italic">self dissolved into the group</text>
  <text x="16" y="74" class="lbl">• no differentiated Me</text>
  <text x="16" y="94" class="lbl">• cult logic · enmeshment</text>
  <text x="16" y="114" class="lbl">• "good Christian X" role</text>
  <text x="16" y="134" class="lbl">• lost voice · burnout</text>
  <g transform="translate(240, 140)">
    <circle r="12" fill="none" stroke="#c96442" stroke-width="1.5" opacity="0.55"/>
    <circle r="7" fill="none" stroke="#c96442" stroke-width="1.5" opacity="0.55"/>
  </g>
</g>

<g transform="translate(580, 515)">
  <rect width="270" height="160" rx="10" fill="#f8f7f2" stroke="#d3cec4"/>
  <text x="16" y="26" class="h2">US vs THEM</text>
  <text x="16" y="46" class="sm" font-style="italic">ingroup honored · outgroup dehumanized</text>
  <text x="16" y="74" class="lbl">• tribalism · racism · war</text>
  <text x="16" y="94" class="lbl">• mortality-salience amplifies</text>
  <text x="16" y="114" class="lbl">• evolutionary reflex untransformed</text>
  <text x="16" y="134" class="lbl">• can be risen above (Wheel L11)</text>
  <g transform="translate(240, 140)">
    <circle cx="-9" cy="0" r="8" fill="#c96442"/>
    <circle cx="11" cy="0" r="8" fill="none" stroke="#c96442" stroke-width="1.5"/>
    <line x1="-3" y1="-11" x2="6" y2="11" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</g>

</svg>
