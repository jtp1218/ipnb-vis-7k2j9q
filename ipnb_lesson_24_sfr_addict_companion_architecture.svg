<svg viewBox="0 0 880 1020" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="system-ui, -apple-system, sans-serif">
<title id="ttl">L24 — Sure-Footed Recovery: Addict's Companion Book Architecture</title>
<desc id="desc">Architecture for Tal Prince's "Sure-Footed Recovery" — the addict's recovery companion to Teresa Prince's "Sure-Footed: Walking Through Betrayal." Author posture: fellow-traveler (addiction is Tal's own story). Theological voice: Brown + Manning as the grace pair; Allender for wound; DeGroat for religious-system formation; Peterson for pace. Architecture: Thompson's 4 pillars (Shame, Story, Confession, Community) preserved; existing SFR frameworks (4 Neuropathways, PAST, BET, Drama Triangle, 4Rs) deployed as operational tools within; closing 5th R: Reach Back.</desc>

