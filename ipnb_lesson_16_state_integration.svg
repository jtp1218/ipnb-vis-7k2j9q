<svg viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">State Integration — Encapsulated Parts vs. Family of Self-States</title>
<desc id="d">Two contrasting modes of holding multiple self-states. SLAP shows trauma-encapsulated parts walled off from each other with no communication. PALS shows the same multiplicity with bridges of communication — the integrative goal. Above, the ABCDE structure of every state of mind. Below, two integration layers and Harter's developmental milestone.</desc>

<style>
  .h { font: 700 22px ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
  .s { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #3a3a3a; }
  .b { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: #3a3a3a; }
  .t { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #555555; }
  .lbl { font: 700 11px ui-sans-serif, system-ui, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
  .tag { font: 600 10px ui-sans-serif, system-ui, sans-serif; fill: #555555; letter-spacing: 0.8px; }
  .cap { font: italic 12px ui-sans-serif, system-ui, sans-serif; fill: #666666; }
  .ss1 { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #2a2a2a; }
  .ss2 { font: 500 10px ui-sans-serif, system-ui, sans-serif; fill: #4a4a4a; }
  .core { font: 700 11px ui-sans-serif, system-ui, sans-serif; fill: #ffffff; }
</style>

<rect width="900" height="740" fill="#ffffff"/>

<!-- Title -->
<text x="450" y="32" class="h" text-anchor="middle">State Integration — From SLAP to PALS</text>
<text x="450" y="54" class="cap" text-anchor="middle">You are not one self with masks. You are a family of self-states. Integration is letting them know each other.</text>

<!-- ===== TOP: ABCDE row ===== -->
<text x="60" y="92" class="tag">EVERY STATE OF MIND HAS FIVE DIMENSIONS  ·  THE ABCDE</text>

<g transform="translate(60,100)">
  <rect width="780" height="56" rx="10" fill="#f4f0e8" stroke="#a8923a" stroke-width="1.5"/>
  <g transform="translate(20,20)" class="b">
    <text x="0" y="0" class="s" fill="#6b5a1c">A</text>
    <text x="18" y="0">Associations</text>

    <text x="148" y="0" class="s" fill="#6b5a1c">B</text>
    <text x="166" y="0">Beliefs</text>

    <text x="260" y="0" class="s" fill="#6b5a1c">C</text>
    <text x="278" y="0">Cognitive patterns</text>

    <text x="450" y="0" class="s" fill="#6b5a1c">D</text>
    <text x="468" y="0">Developmental period</text>

    <text x="660" y="0" class="s" fill="#6b5a1c">E</text>
    <text x="678" y="0">Emotions</text>
  </g>
  <text x="20" y="46" class="t">A state is the condition of a system — these five fire together as a cluster, primed by cues you may not notice.</text>
</g>

<!-- ===== MIDDLE: SLAP vs PALS ===== -->
<text x="60" y="186" class="tag">TWO WAYS THE SELF CAN HOLD ITS MANY STATES</text>

<!-- LEFT: SLAP — encapsulated parts -->
<g transform="translate(60,200)">
  <rect width="370" height="400" rx="12" fill="#fbeeee" stroke="#b04a4a" stroke-width="1.8"/>

  <rect x="0" y="0" width="370" height="32" rx="12" fill="#b04a4a"/>
  <rect x="0" y="20" width="370" height="12" fill="#b04a4a"/>
  <text x="14" y="22" class="lbl">SLAP  ·  ENCAPSULATED PARTS</text>

  <!-- Constellation -->
  <g transform="translate(185,195)">
    <!-- center self (fragmented/unsure) -->
    <circle cx="0" cy="0" r="38" fill="#fff" stroke="#7a2828" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="0" y="4" class="core" fill="#7a2828" text-anchor="middle">SELF?</text>

    <!-- Dissociative barrier walls (thick dashed) -->
    <line x1="0" y1="-42" x2="0" y2="-72" stroke="#7a2828" stroke-width="5" stroke-dasharray="3,3"/>
    <line x1="42" y1="0" x2="72" y2="0" stroke="#7a2828" stroke-width="5" stroke-dasharray="3,3"/>
    <line x1="0" y1="42" x2="0" y2="72" stroke="#7a2828" stroke-width="5" stroke-dasharray="3,3"/>
    <line x1="-42" y1="0" x2="-72" y2="0" stroke="#7a2828" stroke-width="5" stroke-dasharray="3,3"/>

    <!-- Top: Sexual child -->
    <circle cx="0" cy="-115" r="40" fill="#d8a8a8" stroke="#7a2828" stroke-width="2"/>
    <text x="0" y="-117" class="ss1" text-anchor="middle">Sexual</text>
    <text x="0" y="-103" class="ss2" text-anchor="middle">child</text>

    <!-- Right: Student -->
    <circle cx="115" cy="0" r="40" fill="#d8a8a8" stroke="#7a2828" stroke-width="2"/>
    <text x="115" y="-2" class="ss1" text-anchor="middle">Student</text>
    <text x="115" y="12" class="ss2" text-anchor="middle">self</text>

    <!-- Bottom: Rebel teen -->
    <circle cx="0" cy="115" r="40" fill="#d8a8a8" stroke="#7a2828" stroke-width="2"/>
    <text x="0" y="113" class="ss1" text-anchor="middle">Rebel</text>
    <text x="0" y="127" class="ss2" text-anchor="middle">teen</text>

    <!-- Left: Family self -->
    <circle cx="-115" cy="0" r="40" fill="#d8a8a8" stroke="#7a2828" stroke-width="2"/>
    <text x="-115" y="-2" class="ss1" text-anchor="middle">Family</text>
    <text x="-115" y="12" class="ss2" text-anchor="middle">self</text>
  </g>

  <!-- Captions, safely below the bottom circle (which ends at relative y=350) -->
  <text x="185" y="372" class="b" text-anchor="middle" fill="#7a2828">No cross-state communication</text>
  <text x="185" y="390" class="t" text-anchor="middle">Trauma's divide-and-conquer survival</text>
</g>

<!-- RIGHT: PALS — family of self-states -->
<g transform="translate(470,200)">
  <rect width="370" height="400" rx="12" fill="#eaf2f6" stroke="#3a6b85" stroke-width="1.8"/>

  <rect x="0" y="0" width="370" height="32" rx="12" fill="#3a6b85"/>
  <rect x="0" y="20" width="370" height="12" fill="#3a6b85"/>
  <text x="14" y="22" class="lbl">PALS  ·  FAMILY OF SELF-STATES</text>

  <!-- Constellation with hub + 6 states all connected -->
  <g transform="translate(185,195)">
    <!-- spokes from center to each outer state (drawn under the circles) -->
    <line x1="0" y1="0" x2="0" y2="-115" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="0" x2="100" y2="-58" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="0" x2="100" y2="58" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="0" x2="0" y2="115" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="0" x2="-100" y2="58" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>
    <line x1="0" y1="0" x2="-100" y2="-58" stroke="#3a6b85" stroke-width="1.5" opacity="0.75"/>

    <!-- cross-state bridges between adjacent outer states -->
    <line x1="0" y1="-115" x2="100" y2="-58" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>
    <line x1="100" y1="-58" x2="100" y2="58" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>
    <line x1="100" y1="58" x2="0" y2="115" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>
    <line x1="0" y1="115" x2="-100" y2="58" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>
    <line x1="-100" y1="58" x2="-100" y2="-58" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>
    <line x1="-100" y1="-58" x2="0" y2="-115" stroke="#3a6b85" stroke-width="1" opacity="0.32" stroke-dasharray="2,3"/>

    <!-- center: coherent hub -->
    <circle cx="0" cy="0" r="40" fill="#3a6b85" stroke="#1f4a60" stroke-width="2"/>
    <text x="0" y="-2" class="core" text-anchor="middle">COHERENT</text>
    <text x="0" y="11" class="core" text-anchor="middle">SELF</text>

    <!-- 6 self-states around -->
    <g>
      <circle cx="0" cy="-115" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="0" y="-117" class="ss1" text-anchor="middle">Parent</text>
      <text x="0" y="-103" class="ss2" text-anchor="middle">self</text>
    </g>
    <g>
      <circle cx="100" cy="-58" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="100" y="-60" class="ss1" text-anchor="middle">Therapist</text>
      <text x="100" y="-46" class="ss2" text-anchor="middle">self</text>
    </g>
    <g>
      <circle cx="100" cy="58" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="100" y="56" class="ss1" text-anchor="middle">Playful</text>
      <text x="100" y="70" class="ss2" text-anchor="middle">child</text>
    </g>
    <g>
      <circle cx="0" cy="115" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="0" y="113" class="ss1" text-anchor="middle">Solitude</text>
      <text x="0" y="127" class="ss2" text-anchor="middle">self</text>
    </g>
    <g>
      <circle cx="-100" cy="58" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="-100" y="56" class="ss1" text-anchor="middle">Grief</text>
      <text x="-100" y="70" class="ss2" text-anchor="middle">self</text>
    </g>
    <g>
      <circle cx="-100" cy="-58" r="40" fill="#cfe1eb" stroke="#3a6b85" stroke-width="1.5"/>
      <text x="-100" y="-60" class="ss1" text-anchor="middle">Free</text>
      <text x="-100" y="-46" class="ss2" text-anchor="middle">spirit</text>
    </g>
  </g>

  <!-- Captions safely below the bottom circle, short enough to fit panel width -->
  <text x="185" y="372" class="b" text-anchor="middle" fill="#1f4a60">Differentiated AND linked</text>
  <text x="185" y="390" class="t" text-anchor="middle">Permeable boundaries · cross-state talk</text>
</g>

<!-- ===== BOTTOM: Two integration layers + Harter's milestone ===== -->
<g transform="translate(60,620)">
  <rect width="370" height="100" rx="10" fill="#f4ecf4" stroke="#7a5a8a" stroke-width="1.5"/>
  <text x="14" y="22" class="tag" fill="#5a3a6a">TWO LAYERS OF INTEGRATION IN THIS DOMAIN</text>
  <text x="14" y="44" class="b"><tspan class="s" fill="#5a3a6a">Intra-state</tspan> — within a given self-state,</text>
  <text x="14" y="60" class="t">am I prone to chaos / rigidity or harmony?</text>
  <text x="14" y="80" class="b"><tspan class="s" fill="#5a3a6a">Inter-state (cross-state)</tspan> — across my states,</text>
  <text x="14" y="96" class="t">do they communicate, collaborate, respect each other?</text>
</g>

<g transform="translate(470,620)">
  <rect width="370" height="100" rx="10" fill="#eaf4ec" stroke="#5a8a6b" stroke-width="1.5"/>
  <text x="14" y="22" class="tag" fill="#3a6b4a">HARTER'S DEVELOPMENTAL MILESTONE</text>
  <text x="14" y="44" class="t">Early adolescence → many states, no awareness</text>
  <text x="14" y="62" class="t">Mid adolescence → aware of states, can't link them</text>
  <text x="14" y="80" class="b" fill="#1f4a30">Late teens / 20s → <tspan class="s">cross-state navigation</tspan> =</text>
  <text x="14" y="96" class="b" fill="#1f4a30">best single predictor of mental health</text>
</g>
</svg>