<!-- Closing benediction -->
<g transform="translate(0, 880)">
  <rect x="30" y="0" width="820" height="80" rx="8" fill="#1a1a1a"/>
  <text x="440" y="28" text-anchor="middle" class="benediction" fill="#faf9f5">"The therapist you have become IS the work."</text>
  <text x="440" y="50" text-anchor="middle" font-size="11" fill="#d3cec4">25 lessons · 4 modules · the journey from definition to deployment</text>
  <text x="440" y="68" text-anchor="middle" font-size="10" font-style="italic" fill="#d3cec4">Presence · Formulation · Intervention · Lane — anchored in Trinity, deployed in the room, sustained for years.</text>
</g>

</svg>
