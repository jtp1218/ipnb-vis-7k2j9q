<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">The Bridge of Coherent Narrative — How Earned Secure Attachment Happens</title>
  <desc id="d">A childhood (any pattern) on the left, a child's attachment outcome on the right. A faded "transgenerational transmission" path goes straight across. A highlighted bridge labeled "COHERENT NARRATIVE" rests on four pillars: Reflection, Safe Relationships, Therapy, Contemplative Practice. Crossing the bridge produces a child with secure attachment. The AAI predicts at ~85%.</desc>
  <style>
    .h { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:700; font-size:21px; text-anchor:middle; fill:#1a1a1a; }
    .hs { font-family: ui-sans-serif, system-ui, sans-serif; font-style:italic; font-size:13px; text-anchor:middle; fill:#555; }
    .bank { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:700; font-size:15px; text-anchor:middle; }
    .banksub { font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; text-anchor:middle; }
    .pattern { font-family: ui-sans-serif, system-ui, sans-serif; font-size:10px; text-anchor:middle; }
    .bridge { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:800; font-size:20px; text-anchor:middle; fill:#3a2a0a; letter-spacing:1.5px; }
    .bridgesub { font-family: ui-sans-serif, system-ui, sans-serif; font-style:italic; font-size:12px; text-anchor:middle; fill:#5b4717; }
    .pillar { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:700; font-size:12px; text-anchor:middle; fill:#1a1a1a; }
    .pillarsub { font-family: ui-sans-serif, system-ui, sans-serif; font-size:10px; font-style:italic; text-anchor:middle; fill:#444; }
    .faded { font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; font-style:italic; text-anchor:middle; fill:#999; }
    .stat { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:800; font-size:36px; text-anchor:middle; fill:#3bd86a; }
    .statlabel { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:600; font-size:11px; text-anchor:middle; fill:#1c5a2a; }
    .quote { font-family: ui-sans-serif, system-ui, sans-serif; font-weight:700; font-style:italic; font-size:14px; text-anchor:middle; fill:#1a1a1a; }
    .quotesub { font-family: ui-sans-serif, system-ui, sans-serif; font-size:11px; text-anchor:middle; fill:#555; }
  </style>

  <text x="440" y="32" class="h">The Bridge of Coherent Narrative</text>
  <text x="440" y="52" class="hs">How earned secure attachment happens — the Module 2 capstone</text>

  <rect x="30" y="170" width="180" height="200" rx="6" fill="#e8f4ff" stroke="#3b7dd8" stroke-width="2"/>
  <text x="120" y="195" class="bank" fill="#1c4a7a">YOUR CHILDHOOD</text>
  <text x="120" y="212" class="banksub" fill="#1c4a7a">whatever happened</text>
  <text x="120" y="240" class="pattern" fill="#1c4a7a">Secure</text>
  <text x="120" y="260" class="pattern" fill="#1c4a7a">Avoidant</text>
  <text x="120" y="280" class="pattern" fill="#1c4a7a">Ambivalent</text>
  <text x="120" y="300" class="pattern" fill="#1c4a7a">Disorganized</text>
  <text x="120" y="320" class="pattern" fill="#1c4a7a">Trauma · Loss</text>
  <text x="120" y="355" class="banksub" fill="#1c4a7a" font-style="italic">any starting point</text>

  <rect x="670" y="170" width="180" height="200" rx="6" fill="#e8ffe8" stroke="#3bd86a" stroke-width="2.5"/>
  <text x="760" y="195" class="bank" fill="#1c5a2a">YOUR CHILD'S</text>
  <text x="760" y="213" class="bank" fill="#1c5a2a">ATTACHMENT</text>
  <text x="760" y="232" class="banksub" fill="#1c5a2a">to you</text>
  <text x="760" y="275" class="bridge" fill="#1c5a2a" font-size="22">SECURE</text>
  <text x="760" y="298" class="banksub" fill="#1c5a2a" font-style="italic">regardless of where</text>
  <text x="760" y="313" class="banksub" fill="#1c5a2a" font-style="italic">you started</text>
  <text x="760" y="350" class="banksub" fill="#1c5a2a">if you crossed the bridge</text>

  <path d="M 210 350 Q 440 410 670 350" stroke="#bbb" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <text x="440" y="440" class="faded">default path: transgenerational transmission</text>
  <text x="440" y="455" class="faded">(your child inherits your pattern)</text>

  <path d="M 210 200 Q 440 90 670 200" stroke="#d8a83b" stroke-width="4" fill="none"/>
  <rect x="290" y="115" width="300" height="34" rx="6" fill="#fff4cc" stroke="#d8a83b" stroke-width="2.5"/>
  <text x="440" y="137" class="bridge">COHERENT NARRATIVE</text>
  <text x="440" y="162" class="bridgesub">making sense of what happened</text>

  <rect x="240" y="225" width="100" height="100" rx="4" fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="248" class="pillar">Reflection</text>
  <text x="290" y="270" class="pillarsub">journaling</text>
  <text x="290" y="285" class="pillarsub">contemplating</text>
  <text x="290" y="300" class="pillarsub">noticing your</text>
  <text x="290" y="315" class="pillarsub">patterns</text>

  <rect x="350" y="225" width="100" height="100" rx="4" fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="400" y="248" class="pillar">Safe</text>
  <text x="400" y="263" class="pillar">Relationships</text>
  <text x="400" y="285" class="pillarsub">friends, spouse,</text>
  <text x="400" y="300" class="pillarsub">mentors, soul-</text>
  <text x="400" y="315" class="pillarsub">mates</text>

  <rect x="460" y="225" width="100" height="100" rx="4" fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="510" y="248" class="pillar">Therapy</text>
  <text x="510" y="270" class="pillarsub">structured</text>
  <text x="510" y="285" class="pillarsub">earned-secure</text>
  <text x="510" y="300" class="pillarsub">relationship</text>
  <text x="510" y="315" class="pillarsub">in the room</text>

  <rect x="570" y="225" width="100" height="100" rx="4" fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="620" y="248" class="pillar">Contemplative</text>
  <text x="620" y="263" class="pillar">Practice</text>
  <text x="620" y="285" class="pillarsub">prayer, mind-</text>
  <text x="620" y="300" class="pillarsub">fulness, lectio,</text>
  <text x="620" y="315" class="pillarsub">silence</text>

  <text x="120" y="510" class="stat">85%</text>
  <text x="120" y="528" class="statlabel">AAI prediction of</text>
  <text x="120" y="542" class="statlabel">child attachment</text>

  <text x="500" y="500" class="quote">"It's not what happened to you.</text>
  <text x="500" y="520" class="quote">It's how you've made sense of what happened."</text>
  <text x="500" y="540" class="quotesub">— the central finding of the Adult Attachment Interview (Main, Hesse, Goldwyn)</text>

  <text x="440" y="580" class="hs">Bowlby's "working models" are workable on purpose. Neuroplasticity is real. Earned secure is possible at any age.</text>
</svg>
